name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.1.1'

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo $KEYSTORE_BASE64 | base64 -d > app/keystore.p12

      - name: Build Release APK
        env:
          SIGNING_STORE_FILE: keystore.p12
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: gradle assembleRelease

      - name: Find APKs
        run: |
          mkdir -p output_apk
          find app/build/outputs/apk/release -name "*.apk" -exec cp {} output_apk/ \;

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: floatcam-release
          path: output_apk/*.apk

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        with:
          tag_name: "build-${{ github.run_number }}"
          name: "FloatCam Build #${{ github.run_number }}"
          files: output_apk/*.apk
          generate_release_notes: true
